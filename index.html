<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品使用教程</title>
  <meta name="description" content="产品使用教程 - 快速上手，从入门到精通">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-sidebar: #f8f9fa;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --border: #e5e7eb;
      --radius: 8px;
      --sidebar-width: 280px;
      --header-height: 56px;
    }

    [data-theme="dark"] {
      --bg: #0f0f13;
      --bg-sidebar: #16161e;
      --text: #e5e7eb;
      --text-secondary: #9ca3af;
      --accent: #60a5fa;
      --accent-light: #1e293b;
      --border: #27272a;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-header {
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-sidebar);
      z-index: 10;
    }

    .sidebar-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .search-box {
      position: relative;
      margin-bottom: 0.5rem;
    }

    .search-box svg {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }

    .search-box input {
      width: 100%;
      padding: 0.5rem 0.65rem 0.5rem 2rem;
      font-size: 0.85rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .sidebar-nav {
      padding: 0.75rem 0;
      flex: 1;
      overflow-y: auto;
    }

    .nav-section {
      padding: 0 1.25rem;
      margin-bottom: 0.5rem;
    }

    .nav-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      padding: 0.5rem 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.88rem;
      color: var(--text-secondary);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .nav-item:hover {
      background: var(--accent-light);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-secondary);
      flex-shrink: 0;
      opacity: 0.4;
    }

    .nav-item.active .nav-dot {
      background: var(--accent);
      opacity: 1;
    }

    /* ===== Theme Toggle ===== */
    .sidebar-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      bottom: 0;
      background: var(--bg-sidebar);
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }

    .content {
      max-width: 780px;
      width: 100%;
      padding: 2.5rem 2rem 4rem;
    }

    .content-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-secondary);
    }

    .content-empty svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .content-empty h2 {
      font-size: 1.25rem;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    /* ===== Tutorial Content Styles ===== */
    .tutorial-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .tutorial-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .content h2 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .content h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
    }

    .content h4 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.25rem 0 0.4rem;
    }

    .content p {
      margin-bottom: 0.85rem;
      color: var(--text-secondary);
    }

    .content ul, .content ol {
      margin: 0.5rem 0 0.85rem;
      padding-left: 1.5rem;
      color: var(--text-secondary);
    }

    .content li { margin-bottom: 0.25rem; }

    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }

    .content strong { color: var(--text); }

    .content img {
      max-width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin: 1rem 0;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    .content th {
      background: var(--bg-sidebar);
      padding: 0.65rem 1rem;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .content td {
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
    }

    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      background: var(--accent-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Code */
    .content :not(pre) > code {
      background: var(--bg-sidebar);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      border: 1px solid var(--border);
    }

    pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 1.25rem;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 0.85rem 0;
      position: relative;
      font-size: 0.85rem;
      line-height: 1.65;
    }

    pre code {
      font-family: 'JetBrains Mono', monospace;
    }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.3rem 0.65rem;
      font-size: 0.75rem;
      font-family: inherit;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #cdd6f4;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.15); }
    .copy-btn.copied { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); }

    /* Callouts */
    .callout {
      padding: 1rem;
      border-radius: var(--radius);
      margin: 1rem 0;
      display: flex;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    .callout-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .callout-warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .callout-tip { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

    [data-theme="dark"] .callout-info { background: #1e293b; border-color: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .callout-warning { background: #29241c; border-color: #4a3520; color: #fcd34d; }
    [data-theme="dark"] .callout-tip { background: #1a2e1a; border-color: #1a4a1a; color: #86efac; }

    /* Syntax Highlighting */
    .hl-keyword { color: #c678dd; }
    .hl-string { color: #98c379; }
    .hl-comment { color: #5c6370; font-style: italic; }
    .hl-function { color: #61afef; }
    .hl-number { color: #d19a66; }
    .hl-attr { color: #e06c75; }

    /* Mobile */
    .menu-btn {
      display: none;
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 200;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      cursor: pointer;
      color: var(--text);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -100%;
        transition: left 0.25s;
        width: 280px;
      }
      .sidebar.open { left: 0; }
      .menu-btn { display: flex; }
      .content { padding: 2.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>📘 产品使用教程</h1>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="search" id="search-input" placeholder="搜索教程..." autocomplete="off">
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <!-- Populated by JS -->
  </nav>
  <div class="sidebar-footer">
    <button class="theme-btn" id="theme-btn" title="切换暗黑模式" aria-label="切换暗黑模式">
      <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    </button>
    <span style="font-size:0.8rem;color:var(--text-secondary);">暗黑模式</span>
  </div>
</aside>

<!-- Overlay for mobile -->
<div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>

<!-- Mobile menu button -->
<button class="menu-btn" id="menu-btn" aria-label="菜单" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').style.display=document.getElementById('sidebar').classList.contains('open')?'block':'none'">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<!-- Main Content -->
<main class="main" id="main">
  <div class="content" id="content">
    <div class="content-empty" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <h2>选择一篇教程</h2>
      <p>从左侧列表中选择您想查看的教程内容</p>
    </div>
  </div>
</main>

<script>
(function() {
  'use strict';

  var tutorials = [];
  var currentId = null;

  // ---- Theme ----
  var themeBtn = document.getElementById('theme-btn');
  var html = document.documentElement;
  var saved = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', saved);
  updateThemeIcon();

  themeBtn.addEventListener('click', function() {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  function updateThemeIcon() {
    var isDark = html.getAttribute('data-theme') === 'dark';
    document.getElementById('icon-sun').style.display = isDark ? 'none' : '';
    document.getElementById('icon-moon').style.display = isDark ? '' : 'none';
  }

  // ---- Load Index ----
  fetch('tutorials/data/index.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      tutorials = data;
      renderSidebar();
    })
    .catch(function(e) { console.error('加载教程列表失败:', e); });

  // ---- Render Sidebar ----
  function renderSidebar() {
    var nav = document.getElementById('sidebar-nav');
    // Group by category
    var cats = {};
    tutorials.forEach(function(t) {
      var cat = t.category || '其他';
      if (!cats[cat]) cats[cat] = [];
      cats[cat].push(t);
    });

    nav.innerHTML = '';
    Object.keys(cats).forEach(function(cat) {
      var section = document.createElement('div');
      section.className = 'nav-section';
      section.innerHTML = '<div class="nav-section-title">' + esc(cat) + ' (' + cats[cat].length + ')</div>';
      cats[cat].forEach(function(t) {
        var a = document.createElement('a');
        a.className = 'nav-item';
        a.href = '#/' + t.id;
        a.dataset.id = t.id;
        a.innerHTML = '<span class="nav-dot"></span>' + esc(t.title);
        a.addEventListener('click', function(e) {
          e.preventDefault();
          loadTutorial(t.id);
          // Close mobile sidebar
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('overlay').style.display = 'none';
        });
        section.appendChild(a);
      });
      nav.appendChild(section);
    });
  }

  // ---- Search ----
  document.getElementById('search-input').addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    document.querySelectorAll('.nav-item').forEach(function(item) {
      var t = tutorials.find(function(t) { return t.id === item.dataset.id; });
      if (!t) return;
      var match = !q || t.title.toLowerCase().includes(q) ||
        (t.tags || []).some(function(tag) { return tag.toLowerCase().includes(q); }) ||
        (t.description || '').toLowerCase().includes(q);
      item.style.display = match ? '' : 'none';
    });
  });

  // ---- Load Tutorial ----
  function loadTutorial(id) {
    currentId = id;
    var content = document.getElementById('content');
    content.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);">加载中...</div>';

    fetch('tutorials/data/' + id + '.json')
      .then(function(r) { if (!r.ok) throw new Error('Not found'); return r.json(); })
      .then(function(data) {
        document.title = data.title + ' - 产品使用教程';
        content.innerHTML = '';
        content.appendChild(renderTutorial(data));
        // Highlight active
        document.querySelectorAll('.nav-item').forEach(function(a) {
          a.classList.toggle('active', a.dataset.id === id);
        });
        if (window.location.hash !== '#/' + id) {
          history.pushState(null, '', '#/' + id);
        }
        window.scrollTo(0, 0);
      })
      .catch(function(e) {
        content.innerHTML = '<div class="content-empty"><h2>加载失败</h2><p>' + esc(e.message) + '</p></div>';
      });
  }

  // ---- Render Tutorial Content ----
  function renderTutorial(data) {
    var frag = document.createDocumentFragment();

    // Header
    var header = document.createElement('div');
    var diffLabels = { beginner: '入门', intermediate: '进阶', advanced: '高级' };
    header.innerHTML =
      '<h1 class="tutorial-title">' + esc(data.title) + '</h1>' +
      '<div class="tutorial-meta">' +
        (data.date || '') + ' · 阅读约 ' + (data.readingTime || 5) + ' 分钟 · ' +
        (diffLabels[data.difficulty] || '') +
      '</div>';
    if (data.description) {
      header.innerHTML += '<p style="margin-bottom:2rem;">' + esc(data.description) + '</p>';
    }
    frag.appendChild(header);

    // Content blocks
    (data.content || []).forEach(function(block) {
      frag.appendChild(renderBlock(block));
    });

    return frag;
  }

  function renderBlock(block) {
    var type = block.type;
    var el;

    switch (type) {
      case 'heading':
        el = document.createElement('h' + (block.level || 2));
        el.id = slug(block.text);
        el.textContent = block.text;
        return el;

      case 'paragraph':
        el = document.createElement('p');
        el.innerHTML = parseInline(block.text);
        return el;

      case 'code':
        var wrapper = document.createElement('div');
        wrapper.style.position = 'relative';

        var lang = document.createElement('div');
        lang.style.cssText = 'font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.25rem;text-transform:uppercase;letter-spacing:0.05em;';
        lang.textContent = block.language || 'text';
        wrapper.appendChild(lang);

        var copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '复制';
        copyBtn.addEventListener('click', function() {
          navigator.clipboard.writeText(block.code).then(function() {
            copyBtn.textContent = '已复制!';
            copyBtn.classList.add('copied');
            setTimeout(function() { copyBtn.textContent = '复制'; copyBtn.classList.remove('copied'); }, 2000);
          });
        });

        var pre = document.createElement('pre');
        var code = document.createElement('code');
        code.innerHTML = highlightCode(block.code, block.language);
        pre.appendChild(code);
        wrapper.appendChild(copyBtn);
        wrapper.appendChild(pre);
        return wrapper;

      case 'list':
        el = document.createElement(block.ordered ? 'ol' : 'ul');
        (block.items || []).forEach(function(item) {
          var li = document.createElement('li');
          li.innerHTML = parseInline(item);
          el.appendChild(li);
        });
        return el;

      case 'image':
        el = document.createElement('figure');
        el.style.margin = '1rem 0';
        var img = document.createElement('img');
        img.src = block.src;
        img.alt = block.alt || '';
        img.loading = 'lazy';
        el.appendChild(img);
        if (block.caption) {
          var cap = document.createElement('figcaption');
          cap.style.cssText = 'font-size:0.8rem;color:var(--text-secondary);text-align:center;margin-top:0.4rem;';
          cap.textContent = block.caption;
          el.appendChild(cap);
        }
        return el;

      case 'table':
        el = document.createElement('table');
        if (block.headers) {
          var thead = document.createElement('thead');
          var tr = document.createElement('tr');
          block.headers.forEach(function(h) {
            var th = document.createElement('th');
            th.textContent = h;
            tr.appendChild(th);
          });
          thead.appendChild(tr);
          el.appendChild(thead);
        }
        if (block.rows) {
          var tbody = document.createElement('tbody');
          block.rows.forEach(function(row) {
            var tr2 = document.createElement('tr');
            row.forEach(function(cell) {
              var td = document.createElement('td');
              td.textContent = cell;
              tr2.appendChild(td);
            });
            tbody.appendChild(tr2);
          });
          el.appendChild(tbody);
        }
        return el;

      case 'blockquote':
        el = document.createElement('blockquote');
        el.textContent = block.text;
        return el;

      case 'divider':
        return document.createElement('hr');

      case 'callout':
        el = document.createElement('div');
        el.className = 'callout callout-' + (block.calloutType || 'info');
        var iconMap = { info: 'ℹ️', warning: '⚠️', tip: '💡' };
        el.innerHTML = '<span>' + (iconMap[block.calloutType] || 'ℹ️') + '</span><div>' + parseInline(block.text || '') + '</div>';
        return el;

      default:
        el = document.createElement('p');
        el.textContent = JSON.stringify(block);
        return el;
    }
  }

  // ---- Inline formatting ----
  function parseInline(text) {
    var html = esc(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`(.+?)`/g, '<code>$1</code>');
    html = html.replace(/\[(.+?)\]\((.+?)\)/g, function(m, t, url) {
      var ext = url.startsWith('http') ? ' target="_blank" rel="noopener"' : '';
      return '<a href="' + url + '"' + ext + '>' + t + '</a>';
    });
    return html;
  }

  // ---- Syntax highlighting ----
  function highlightCode(code, lang) {
    var html = esc(code);
    // Strings
    html = html.replace(/(&quot;(?:[^&]|&(?!quot;))*&quot;)/g, '<span class="hl-string">$1</span>');
    html = html.replace(/(&#39;(?:[^&]|&(?!amp;))*&#39;)/g, '<span class="hl-string">$1</span>');
    // Comments
    html = html.replace(/(\/\/.*)/g, '<span class="hl-comment">$1</span>');
    html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-comment">$1</span>');
    // Numbers
    html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="hl-number">$1</span>');
    // Keywords
    var keywords = {
      js: ['const','let','var','function','return','if','else','for','while','class','export','import','from','async','await','try','catch','throw','new','this','null','undefined','true','false'],
      python: ['def','class','return','if','elif','else','for','while','import','from','as','try','except','finally','with','pass','break','continue','in','is','not','and','or','True','False','None'],
      c: ['int','char','float','double','void','long','short','unsigned','const','static','struct','enum','typedef','sizeof','return','if','else','for','while','switch','case','break','include','define','NULL'],
      bash: ['if','then','else','fi','for','while','do','done','echo','cd','ls','export','source','git','npm','sudo','mkdir','rm','cp','mv','cat','grep']
    };
    var kw = keywords[lang] || [];
    kw.forEach(function(k) {
      html = html.replace(new RegExp('\\b(' + k + ')\\b', 'g'), '<span class="hl-keyword">$1</span>');
    });
    // Function calls
    html = html.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="hl-function">$1</span>(');
    return html;
  }

  // ---- Utilities ----
  function esc(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function slug(text) {
    return text.toLowerCase().replace(/[^\w一-鿿\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  }

  // ---- Routing ----
  function handleRoute() {
    var hash = window.location.hash;
    if (hash.startsWith('#/')) {
      var id = hash.substring(2).split('?')[0];
      if (id && tutorials.length > 0) loadTutorial(id);
    }
  }

  window.addEventListener('hashchange', handleRoute);

  // Wait for tutorials to load then handle initial route
  var origFetch = fetch;
  var indexPromise = origFetch('tutorials/data/index.json').then(function(r) { return r.json(); });
  indexPromise.then(function(data) {
    tutorials = data;
    renderSidebar();
    handleRoute();
  });
})();
</script>
